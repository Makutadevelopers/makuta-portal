version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: makuta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       makuta_portal
      POSTGRES_USER:     makuta_admin
      POSTGRES_PASSWORD: localdevpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
